version: "3.9"

services:
  #Редис
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
      
  #RabbitMQ
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      
  #Celery
  celery_worker:
    build: ./bot_service
    container_name: celery_worker
    command: uv run celery -A app.infra.celery_app:celery_app worker --loglevel=info
    env_file:
      - ./bot_service/.env
    depends_on:
      - redis
      - rabbitmq
  
  #сервис авторизации
  auth_service:
    build: ./auth_service
    container_name: auth_service
    ports:
      - "8000:8000"
    env_file:
      - ./auth_service/.env
  
  #бот
  bot_service:
    build: ./bot_service
    container_name: bot_service
    ports:
      - "8001:8000"
    env_file:
      - ./bot_service/.env
    depends_on:
      - redis
      - rabbitmq
